services:
  revenant_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revenant_web
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./.env
    environment:
      - VIRTUAL_HOST=astrali.tech,www.astrali.tech
      - LETSENCRYPT_HOST=astrali.tech,www.astrali.tech
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_EMAIL=omarmgmi08@gmail.com
    networks:
      - webnet

networks:
  webnet:
    external: true
