services:
  omniate-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: omniate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniate}
      POSTGRES_DB: omniate
    volumes:
      - omniate-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  omniate-redis:
    image: redis:7.2-alpine
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  omniate-api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://omniate:${POSTGRES_PASSWORD:-omniate}@omniate-db:5432/omniate
      REDIS_URL: redis://omniate-redis:6379/0
      FASTAPI_DEBUG: "false"
      APP_ENV: production
    env_file: .env
    depends_on:
      omniate-db:
        condition: service_healthy
      omniate-redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  omniate-worker:
    build: ./backend
    command: arq app.workers.scheduler.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://omniate:${POSTGRES_PASSWORD:-omniate}@omniate-db:5432/omniate
      REDIS_URL: redis://omniate-redis:6379/0
      APP_ENV: production
    env_file: .env
    depends_on:
      omniate-db:
        condition: service_healthy
      omniate-redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  omniate-web:
    build:
      context: .
      args:
        FASTAPI_BASE_URL: http://omniate-api:8000
    environment:
      FASTAPI_BASE_URL: http://omniate-api:8000
    depends_on:
      - omniate-api
    networks:
      - internal
      - webnet
    restart: unless-stopped

volumes:
  omniate-db-data:
  redis-data:

networks:
  internal:
    driver: bridge
  webnet:
    external: true
